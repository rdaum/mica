# Mica DogStatsD dashboard for ../spinal-tap.
# Run Mica with:
#   --dogstatsd-endpoint 127.0.0.1:8125 --dogstatsd-interval-secs 1

listen = "127.0.0.1:8125"
history_points = 240
redraw_millis = 250

[[metrics]]
name = "mica_daemon.endpoints_started"
view = "numeric"
kind = "counter"
display = "total"
unit = "endpoints"

[[metrics]]
name = "mica_daemon.dogstatsd_exporters_started"
view = "numeric"
kind = "counter"
display = "total"
unit = "exporters"

[[metrics]]
name = "mica_daemon.dogstatsd_configured"
view = "numeric"
kind = "gauge"
display = "latest"

[[metrics]]
name = "mica_relation_kernel.transactions_started"
view = "chart"
kind = "counter"
display = "rate"
unit = "txn/s"

[[metrics]]
name = "mica_relation_kernel.transaction_commits"
view = "sparkline"
kind = "counter"
display = "rate"
unit = "commit/s"

[[metrics]]
name = "mica_relation_kernel.transaction_commit_duration_us.count"
view = "sparkline"
kind = "counter"
display = "rate"
unit = "commit/s"

[[metrics]]
name = "mica_relation_kernel.transaction_commit_duration_us.sum"
view = "sparkline"
kind = "counter"
display = "rate"
unit = "us/s"

[[metrics]]
name = "mica_relation_kernel.transaction_commit_changes.count"
view = "sparkline"
kind = "counter"
display = "rate"
unit = "commit/s"

[[metrics]]
name = "mica_relation_kernel.transaction_commit_changes.sum"
view = "sparkline"
kind = "counter"
display = "rate"
unit = "tuple/s"

[[metrics]]
name = "mica_relation_kernel.transaction_write_operations"
view = "sparkline"
