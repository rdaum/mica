# Mica DogStatsD dashboard for ../spinal-tap.
# Run Mica with:
#   --dogstatsd-endpoint 127.0.0.1:8125 --dogstatsd-interval-secs 1

listen = "127.0.0.1:8125"
history_points = 240
redraw_millis = 250

[[metrics]]
name = "mica_daemon.endpoints_started"
view = "numeric"
kind = "counter"
display = "total"
unit = "endpoints"

[[metrics]]
name = "mica_daemon.dogstatsd_exporters_started"
view = "numeric"
kind = "counter"
display = "total"
unit = "exporters"

[[metrics]]
name = "mica_daemon.dogstatsd_configured"
view = "numeric"
kind = "gauge"
display = "latest"

[[metrics]]
name = "mica_daemon.dogstatsd_export_ticks"
view = "sparkline"
kind = "counter"
display = "rate"
unit = "tick/s"

