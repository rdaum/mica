comments:
  - columns: 80
    extension: rs
    commenter:
      type: line
      comment_char: "//"
      trailing_lines: 1
  - columns: 80
    extension: js
    commenter:
      type: line
      comment_char: "//"
      trailing_lines: 1
  - columns: 80
    extension: ts
    commenter:
      type: line
      comment_char: "//"
      trailing_lines: 1
  - columns: 80
    extension: tsx
    commenter:
      type: line
      comment_char: "//"
      trailing_lines: 1
  - columns: 80
    extension: jsx
    commenter:
      type: line
      comment_char: "//"
      trailing_lines: 1
  - columns: 80
    extension: mica
    commenter:
      type: line
      comment_char: "//"
      trailing_lines: 1
  - columns: 80
    extension: sh
    commenter:
      type: line
      comment_char: "#"
      trailing_lines: 1

excludes:
  - \.gitignore
  - \.dockerignore
  - \.gitmodules
  - \.vscodeignore
  - .*lock
  - \.git/.*
  - \.idea/.*
  - \.cargo/.*
  - \.npm-cache/.*
  - .*\.npmrc
  - \.moor-host-data/.*
  - target/*
  - README.*
  - LICENSE.*
  - Dockerfile
  - core
  - cores/*
  - book/*
  - __pycache__/*
  - .envrc
  - .*\.env$
  - .*\.env\..*
  - node_modules/*
  - generated/*
  - web-client/public/*
  - .*\.(md|rst|txt|yml|yaml|png|jpg|gif|db|pem|lock|json|toml|in|out|html|moot|edn|node|css|gz|tgz|tar|zip|awk|data|conf|nix|el|ttf|otf|wasm|cfg)
