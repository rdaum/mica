[workspace]
resolver = "3"
members = [
    "crates/compiler",
    "crates/driver",
    "crates/runner",
    "crates/relation-kernel",
    "crates/runtime",
    "crates/var",
    "crates/vm",
]
exclude = ["crates/var/fuzz"]

[workspace.package]
edition = "2024"
rust-version = "1.95"
license = "AGPL-3.0-only"

[workspace.dependencies]
mica-compiler = { path = "crates/compiler" }
mica-driver = { path = "crates/driver" }
mica-relation-kernel = { path = "crates/relation-kernel" }
mica-runtime = { path = "crates/runtime" }
mica-var = { path = "crates/var" }
mica-vm = { path = "crates/vm" }

# core
arc-swap = "1.9"
clap = { version = "4.6", features = ["derive"] }
compio = { version = "0.19.0-rc.1", features = ["time"] }
fjall = "3.1"

# for util
rustyline = "18.0.0"

# development / testing / benching
micromeasure = "0.6"
proptest = "1.11"
