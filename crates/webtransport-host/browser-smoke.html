<!doctype html>
<meta charset="utf-8">
<title>Mica WebTransport Smoke</title>
<style>
  :root {
    color-scheme: light dark;
    font-family: system-ui, sans-serif;
  }

  body {
    margin: 0;
    padding: 24px;
    background: Canvas;
    color: CanvasText;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
  }

  h1 {
    margin: 0 0 20px;
    font-size: 24px;
    font-weight: 650;
  }

  form {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    align-items: end;
  }

  label {
    display: grid;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
  }

  label.url {
    grid-column: 1 / -1;
  }

  input,
  button,
  #mount,
  pre {
    font: inherit;
  }

  input {
    min-width: 0;
    padding: 8px 10px;
    border: 1px solid color-mix(in srgb, CanvasText 30%, Canvas);
    border-radius: 6px;
    background: Canvas;
    color: CanvasText;
  }

  button {
    min-height: 38px;
    border: 1px solid color-mix(in srgb, CanvasText 35%, Canvas);
    border-radius: 6px;
    background: ButtonFace;
    color: ButtonText;
  }

  button:disabled {
    opacity: 0.55;
  }

  #mount,
  pre {
    margin: 18px 0 0;
    padding: 12px;
    border: 1px solid color-mix(in srgb, CanvasText 20%, Canvas);
    border-radius: 6px;
    background: color-mix(in srgb, CanvasText 5%, Canvas);
  }

  #mount {
    min-height: 52px;
  }

  pre {
    min-height: 280px;
    overflow: auto;
    white-space: pre-wrap;
  }
</style>
<main>
  <h1>Mica WebTransport Smoke</h1>
  <form id="controls">
    <label class="url">
      URL
      <input id="url" value="https://127.0.0.1:4433/view" autocomplete="off">
    </label>
    <label class="url">
      Certificate SHA-256
      <input id="certHash" autocomplete="off" placeholder="optional hex-encoded certificate hash">
    </label>
    <label>
      Session
      <input id="session" type="number" min="0" value="7">
    </label>
    <label>
      View
      <input id="view" type="number" min="0" value="11">
    </label>
    <label>
      Room
      <input id="room" type="number" min="0" value="1">
    </label>
    <label>
      Revision
      <input id="revision" type="number" min="0" value="13">
    </label>
    <label>
      Signature
      <input id="signature" type="number" min="0" value="17">
    </label>
    <button id="connect" type="button">Connect</button>
    <button id="need" type="button" disabled>Need View</button>
    <button id="have" type="button" disabled>Have View</button>
    <label class="url">
      Message
      <input id="chatText" value="hello from browser" autocomplete="off">
    </label>
    <button id="post" type="button" disabled>Post</button>
  </form>
  <div id="mount"></div>
  <pre id="log"></pre>
</main>
<script type="module">
  import {
    MicaWebTransportSyncClient,
    applySnapshot,
    validateSnapshotEnvelope,
  } from "./sync-client.js";

  const controls = document.getElementById("controls");
  const mount = document.getElementById("mount");
  const logEl = document.getElementById("log");
  const connectButton = document.getElementById("connect");
  const needButton = document.getElementById("need");
  const haveButton = document.getElementById("have");
  const postButton = document.getElementById("post");
  let client;
  const smoke = {
    events: [],
    lastEnvelope: null,
    snapshot: null,
    snapshotPayload: null,
    snapshotValid: false,
    error: null,
  };
  window.micaWebTransportSmoke = smoke;

  function applyQueryParams() {
    const params = new URLSearchParams(location.search);
    for (const id of ["url", "certHash", "session", "view", "room", "revision", "signature", "chatText"]) {
      const value = params.get(id);
      if (value !== null) {
        field(id).value = value;
      }
    }
  }

  function field(id) {
    return document.getElementById(id);
  }

  function numberField(id) {
    return BigInt(field(id).value || "0");
  }

  function log(line, data) {
    const suffix = data === undefined ? "" : ` ${JSON.stringify(data)}`;
    logEl.textContent += `${new Date().toISOString()} ${line}${suffix}\n`;
    logEl.scrollTop = logEl.scrollHeight;
    smoke.events.push({ line, data });
  }

  function viewState(payload) {
    return {
      session: numberField("session"),
      view: numberField("view"),
      clientRevision: numberField("revision"),
      clientSignature: numberField("signature"),
      payload,
    };
  }

  function handleEnvelope(envelope) {
    smoke.lastEnvelope = envelope;
    if (envelope.kind === "ViewSnapshot") {
      const snapshot = validateSnapshotEnvelope(envelope);
      smoke.snapshot = envelope;
      smoke.snapshotPayload = snapshot.payload;
      smoke.snapshotValid = snapshot.valid;
      if (snapshot.valid) {
        applySnapshot(mount, snapshot.payload);
      }
    }
    log("recv", envelope);
  }

  async function connect() {
    controls.querySelectorAll("button").forEach((button) => {
      button.disabled = true;
    });
    try {
      smoke.error = null;
      smoke.snapshotValid = false;
      client = new MicaWebTransportSyncClient({
        url: field("url").value,
        certificateHash: field("certHash").value,
        onEnvelope: handleEnvelope,
        onClose: () => log("closed"),
        onError: (error) => {
          smoke.error = String(error);
          log("transport error", String(error));
        },
      });
      await client.connect();
      needButton.disabled = false;
      haveButton.disabled = false;
      postButton.disabled = false;
      connectButton.disabled = true;
      log("connected");
    } catch (error) {
      connectButton.disabled = false;
      smoke.error = String(error);
      log("connect error", String(error));
      throw error;
    }
  }

  async function sendNeedView() {
    await client.needView(viewState("need"));
    log("sent NeedView");
  }

  async function sendHaveView() {
    await client.haveView(viewState("have"));
    log("sent HaveView");
  }

  async function sendChatPost() {
    await client.postChat({
      room: numberField("room"),
      text: field("chatText").value,
    });
    log("sent chat_post");
  }

  connectButton.addEventListener("click", connect);

  needButton.addEventListener("click", sendNeedView);

  haveButton.addEventListener("click", sendHaveView);

  postButton.addEventListener("click", sendChatPost);

  applyQueryParams();

  window.micaWebTransportSmoke.connect = connect;
  window.micaWebTransportSmoke.sendNeedView = sendNeedView;
  window.micaWebTransportSmoke.sendHaveView = sendHaveView;
  window.micaWebTransportSmoke.sendChatPost = sendChatPost;

  window.addEventListener("load", () => {
    const auto = new URLSearchParams(location.search).get("auto");
    if (auto === "need") {
      connect()
        .then(sendNeedView)
        .catch((error) => {
          smoke.error = String(error);
        });
    }
  });
</script>
